<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT 電波受信範囲シミュレーター (プライベート版)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <style>
        :root { --primary-color: #0071e3; --success-color: #34c759; --warning-color: #ff9500; --danger-color: #ff3b30; --bg-color: #1c1c1e; --panel-bg: #2c2c2e; --text-color: #ffffff; --text-secondary: #aeaeb2; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel-bg); padding: 10px 20px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid #3a3a3c; }
        header h1 { margin: 0; font-size: 15px; font-weight: 600; }
        .target-band { background: #3a3a3c; border: 1px solid #48484a; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: var(--text-color); margin-left: 10px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 7; height: 100%; background: #000; }
        .sidebar { flex: 3; background: var(--panel-bg); box-shadow: -2px 0 10px rgba(0,0,0,0.3); padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; z-index: 999; border-left: 1px solid #3a3a3c; }
        .section-title { font-size: 13px; font-weight: bold; color: var(--text-secondary); border-bottom: 1px solid #3a3a3c; padding-bottom: 5px; margin-bottom: 5px; }
        .control-group { background: #232325; padding: 10px; border-radius: 8px; border: 1px solid #3a3a3c; font-size: 13px; }
        .slider-box { margin-bottom: 12px; background: #2c2c2e; padding: 10px; border-radius: 6px; border: 1px solid #3a3a3c; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-weight: 600; }
        .num-input { width: 75px; padding: 4px; border: 1px solid #48484a; background: #1c1c1e; color: #30a2ff; border-radius: 4px; text-align: right; font-weight: bold; font-size: 13px; }
        .range-slider { width: 100%; margin: 5px 0; cursor: pointer; }
        .info-box { background: #232325; border-left: 4px solid #48484a; padding: 10px; border-radius: 4px; font-size: 13px; line-height: 1.5; color: #f2f2f7; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; font-weight: bold; margin-right: 5px; }
        .bg-normal { background: var(--success-color); }
        .bg-es { background: var(--warning-color); }
        .bg-uhf { background: var(--danger-color); }
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .preset-btn { background: #2c2c2e; color: white; border: 1px solid #48484a; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: left; transition: all 0.2s; }
        .preset-btn:hover { background: #3a3a3c; border-color: #8e8e93; }
        .preset-desc { font-size: 9px; color: var(--text-secondary); font-weight: normal; display: block; margin-top: 2px; }
        .delete-lock-container { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; background: #2c2c2e; padding: 6px; border-radius: 6px; border: 1px solid #3a3a3c; }
        .clear-memo-btn { background: #555; color: #aaa; border: none; flex: 1; padding: 6px; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: not-allowed; }
        .clear-memo-btn.unlocked { background: var(--danger-color); color: white; cursor: pointer; }
        footer { background: #111; color: var(--text-secondary); font-size: 11px; text-align: center; padding: 6px; border-top: 1px solid #2c2c2e; z-index: 1000; }
        .author-input { background: transparent; border: none; border-bottom: 1px dashed #666; color: #30a2ff; font-size: 11px; font-weight: bold; text-align: center; width: 120px; cursor: pointer; }
        .leaflet-popup-content-wrapper { background: #2c2c2e !important; color: white !important; border: 1px solid #48484a; }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center;"><h1>OSINT 電波受信範囲シミュレーター</h1><span class="target-band">スタンドアロン・完全非公開版</span></div>
        <a href="https://swc.nict.go.jp/" target="_blank" style="background: #1c1c1e; color: #30a2ff; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid #3a3a3c;">🌐 NICT 宇宙天気情報 ↗</a>
    </header>
    <div class="main-container">
        <div id="map"></div>
        <div class="sidebar">
            <div><div class="section-title">📌 分析メモ機能</div>
                <div class="control-group" style="background: #1c1c1e;">
                    <p style="margin: 0; color: #30a2ff; font-size: 11px; font-weight: bold;">🔒 完全にローカル保存です。</p>
                    <div class="delete-lock-container">
                        <label style="font-size: 11px; color: var(--text-secondary); cursor: pointer;"><input type="checkbox" id="delete-lock-chk" onchange="toggleDeleteLock()"> 🔓ロック解除</label>
                        <button id="clear-memos-btn" class="clear-memo-btn" disabled onclick="clearAllMemos()">🗑️ 全ピン削除</button>
                    </div>
                </div>
            </div>
            <div><div class="section-title">① 警戒地域一発配置</div>
                <div class="preset-grid">
                    <button class="preset-btn" onclick="loadPreset('taiwan')">🌊 台湾海峡周辺</button>
                    <button class="preset-btn" onclick="loadPreset('scsea')">🏝️ 南シナ海諸島</button>
                    <button class="preset-btn" onclick="loadPreset('korea')">🦅 朝鮮半島</button>
                </div>
            </div>
            <div><div class="section-title">④ OSINT 分析ステータス</div><div id="info" class="info-box">クリックして開始</div></div>
        </div>
    </div>
    <footer>&copy; <span id="current-year"></span> <input type="text" id="author-name-input" class="author-input" value="お名前を入力" onchange="saveAuthorName(this.value)"> / スタンドアロン型ローカル専用ツール</footer>
<script>
    document.getElementById('current-year').textContent = new Date().getFullYear();
    function saveAuthorName(name) { localStorage.setItem('osint_author_name', name); }
    const savedName = localStorage.getItem('osint_author_name');
    if (savedName) { document.getElementById('author-name-input').value = savedName; }

    const esriLatest = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
    const labelsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

    const map = L.map('map', { center: [24.0, 122.5], zoom: 4, layers: [esriLatest, labelsLayer] });
    const normalLayerGroup = L.layerGroup().addTo(map);
    const memoLayerGroup = L.layerGroup().addTo(map);

    const baseMaps = { "🛰️ 衛星画像": esriLatest }; // ← ここが修正箇所です
    const overlayMaps = { "🏷️ ラベル": labelsLayer, "通常エリア": normalLayerGroup }; // ← ここが修正箇所です
    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

    let savedMemos = JSON.parse(localStorage.getItem('osint_memos') || '[]');
    function renderSavedMemos() {
        memoLayerGroup.clearLayers();
        savedMemos.forEach((memo, index) => {
            L.marker([memo.lat, memo.lng]).addTo(memoLayerGroup).bindPopup(memo.title);
        });
    }
    map.on('contextmenu', function(e) {
        const title = prompt("ピン名："); if (!title) return;
        savedMemos.push({ lat: e.latlng.lat, lng: e.latlng.lng, title: title });
        localStorage.setItem('osint_memos', JSON.stringify(savedMemos)); renderSavedMemos();
    });
    window.toggleDeleteLock = function() {
        const chk = document.getElementById('delete-lock-chk'); const btn = document.getElementById('clear-memos-btn');
        if (chk.checked) { btn.removeAttribute('disabled'); btn.classList.add('unlocked'); } else { btn.setAttribute('disabled', 'true'); btn.classList.remove('unlocked'); }
    };
    window.clearAllMemos = function() { if (confirm("削除しますか？")) { savedMemos = []; localStorage.removeItem('osint_memos'); renderSavedMemos(); } };
    renderSavedMemos();
</script>
</body>
</html>
