<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電波受信範囲シミュレーター (VHF/UHF・世界対応完全版)</title>
    <!-- Leafletの地図スタイル -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 地名検索プラグインの読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <style>
        :root {
            --primary-color: #0071e3;
            --success-color: #28a745;
            --warning-color: #fd7e14;
            --bg-color: #f5f5f7;
            --panel-bg: #ffffff;
            --text-color: #1d1d1f;
        }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel-bg); padding: 10px 20px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        header h1 { margin: 0; font-size: 15px; font-weight: 600; }
        .target-band { background: #f5f5f7; border: 1px solid #d2d2d7; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #1d1d1f; margin-left: 10px; }
        .nict-btn { background: #eef7ff; color: var(--primary-color); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid rgba(0,113,227,0.2); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 7; height: 100%; }
        .sidebar { flex: 3; background: var(--panel-bg); box-shadow: -2px 0 10px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; z-index: 999; }
        .section-title { font-size: 13px; font-weight: bold; color: #86868b; border-bottom: 1px solid #e5e5ea; padding-bottom: 5px; margin-bottom: 5px; }
        .control-group { background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #e5e5ea; font-size: 13px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; }
        .slider-box { margin-bottom: 10px; background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #e5e5ea; }
        .slider-box span { float: right; font-weight: bold; color: var(--primary-color); }
        .slider-box span.es-color { color: var(--warning-color); }
        .info-box { background: #fafafa; border-left: 4px solid #ccc; padding: 10px; border-radius: 4px; font-size: 13px; line-height: 1.5; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; font-weight: bold; margin-right: 5px; }
        .bg-normal { background: var(--success-color); }
        .bg-es { background: var(--warning-color); }
        .measure-btn { background: #ffffff; color: #1d1d1f; border: 1px solid #d2d2d7; width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .measure-btn:hover { background: #f5f5f7; }
        .measure-active { background: #ffebeb !important; color: #ff3b30 !important; border-color: #ff3b30 !important; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } #map { flex: 4; } .sidebar { flex: 6; } }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center;">
            <h1>電波受信範囲シミュレーター (世界対応完全版)</h1>
            <span class="target-band">対象：VHF / UHF帯</span>
        </div>
        <a href="https://swc.nict.go.jp/trend/world.html" target="_blank" rel="noopener noreferrer" class="nict-btn">🌐 世界の電離圏概況 (NICT) ↗</a>
    </header>

    <div class="main-container">
        <div id="map"></div>
        <div class="sidebar">
            <div>
                <div class="section-title">① 位置の決定</div>
                <div class="control-group">
                    <p style="margin: 0; color: #666; font-size: 12px;">地図上をクリックして「受信者（アンテナ）」を設置してください。右上の虫眼鏡マークから都市名の検索も可能です。</p>
                </div>
            </div>

            <div>
                <div class="section-title">② 高度・条件設定 (VHF/UHF基準)</div>
                <div class="control-group">
                    <div class="slider-box">
                        <label>受信者の高度: <span id="rx-val">100</span> m</label>
                        <input type="range" class="sim-input" id="alt-rx" min="0" max="4000" step="10" value="100">
                    </div>
                    <div class="slider-box">
                        <label>発信源の高度: <span id="tx-val">3,800</span> m</label>
                        <input type="range" class="sim-input" id="alt-tx" min="0" max="15000" step="100" value="3800">
                    </div>
                    <div class="slider-box">
                        <label>周辺の電離層(Es層)強度: <span id="es-val" class="es-color">6</span> MHz</label>
                        <input type="range" class="sim-input" id="es-intensity" min="0" max="25" step="1" value="6">
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">③ 距離計測ツール</div>
                <button id="measure-btn" class="measure-btn">📏 2点間の距離を測る (OFF)</button>
                <p id="measure-hint" style="margin: 5px 0 0 0; color: #666; font-size: 11px; display: none; text-align: center;">地図上の2箇所をポチ・ポチとクリックしてください</p>
            </div>

            <div>
                <div class="section-title">④ 受信ステータス</div>
                <div id="info" class="info-box">地図をクリックすると開始します。</div>
            </div>
        </div>
    </div>

<script>
    // 初期表示
    const map = L.map('map').setView([25.0, 125.0], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 地名検索ボタンを地図の右上に追加
    L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "地名を検索（例: 東京, London）..."
    })
    .on('markgeocode', function(e) {
        const bbox = e.geocode.bbox;
        const poly = L.polygon([
            bbox.getSouthEast(), bbox.getNorthEast(), bbox.getNorthWest(), bbox.getSouthWest()
        ]);
        map.fitBounds(poly.getBounds());
        currentLatlng = e.geocode.center;
        updateSimulation();
    })
    .addTo(map);

    let receiverMarker = null;
    let normalCircle = null;
    let esRingOuter = null;
    let esRingInner = null;
    let currentLatlng = null;

    // 距離計測用の変数
    let isMeasuring = false;
    let measurePoints = [];
    let measureMarkers = [];
    let measureLine = null;

    function calculateDistance(rxAlt, txAlt) {
        return 4.12 * (Math.sqrt(rxAlt) + Math.sqrt(txAlt));
    }

    function updateSimulation() {
        const rxAlt = parseFloat(document.getElementById('alt-rx').value);
        const txAlt = parseFloat(document.getElementById('alt-tx').value);
        const esMhz = parseInt(document.getElementById('es-intensity').value);

        document.getElementById('rx-val').innerText = rxAlt.toLocaleString();
        document.getElementById('tx-val').innerText = txAlt.toLocaleString();
        document.getElementById('es-val').innerText = esMhz;

        if (!currentLatlng) return;

        if (receiverMarker) map.removeLayer(receiverMarker);
        if (normalCircle) map.removeLayer(normalCircle);
        if (esRingOuter) map.removeLayer(esRingOuter);
        if (esRingInner) map.removeLayer(esRingInner);

        receiverMarker = L.marker(currentLatlng).addTo(map).bindPopup("<b>受信者（アンテナ）</b>").openPopup();

        // 1. 通常の見通し距離（緑の円）
        const distanceKm = calculateDistance(rxAlt, txAlt);
        normalCircle = L.circle(currentLatlng, {
            color: '#28a745',
            fillColor: '#28a745',
            fillOpacity: 0.0,
            weight: 3,
            radius: distanceKm * 1000
        }).addTo(map);

        // 2. 電離層（Es層）反射エリアのドーナツ
        let esActive = false;
        if (esMhz > 0) {
            esActive = true;
            const opacity = Math.min(0.02 + (esMhz * 0.015), 0.4);
            // 外側の限界線（実線：2200km）
            esRingOuter = L.circle(currentLatlng, { color: '#fd7e14', fillColor: '#fd7e14', fillOpacity: opacity, weight: 2, radius: 2200 * 1000 }).addTo(map);
            // 内側の開始線（点線：1000km）
            esRingInner = L.circle(currentLatlng, { color: '#fd7e14', fillColor: '#ffffff', fillOpacity: 0.0, weight: 1.5, dashArray: '6, 6', radius: 1000 * 1000 }).addTo(map);
        }

        let infoHtml = `
            <span class="badge bg-normal">通常時の見通し距離（緑）</span><br>
            直進するVHF/UHF帯の電波が地球の丸みに遮られずに直接届く限界は <strong>約 ${Math.round(distanceKm)} km</strong> です。<br><br>
            <span class="badge bg-es">電離層（Es層）の異常伝搬（オレンジ）</span><br>
        `;

        if (esActive) {
            infoHtml += `現在エリアの電離層強度 <strong>${esMhz} MHz</strong> が反映中。<br>
            内側の<strong>点線(1,000km)</strong>から外側の<strong>実線(2,200km)</strong>の間のドーナツ圏内にある発信源からの電波が、突発性電離層に反射してワープして届く可能性があります。`;
            document.getElementById('info').style.borderLeftColor = "var(--warning-color)";
        } else {
            infoHtml += `電離層反射はありません。通常の見通し範囲（緑の線）の直接波のみ受信可能です。`;
            document.getElementById('info').style.borderLeftColor = "var(--success-color)";
        }

        document.getElementById('info').innerHTML = infoHtml;
    }

    // 距離計測の切り替え
    document.getElementById('measure-btn').addEventListener('click', function() {
        isMeasuring = !isMeasuring;
        if (isMeasuring) {
            this.innerText = "❌ 計測を終了してクリア";
            this.classList.add('measure-active');
            document.getElementById('measure-hint').style.display = "block";
            // 計測開始時に一度クリア
            clearMeasurement();
        } else {
            this.innerText = "📏 2点間の距離を測る (OFF)";
            this.classList.remove('measure-active');
            document.getElementById('measure-hint').style.display = "none";
            clearMeasurement();
        }
    });

    function clearMeasurement() {
        measureMarkers.forEach(m => map.removeLayer(m));
        measureMarkers = [];
        measurePoints = [];
        if (measureLine) { map.removeLayer(measureLine); measureLine = null; }
    }

    // マップクリック時の処理
    map.on('click', function(e) {
        if (isMeasuring) {
            // 距離計測モードのとき
            if (measurePoints.length >= 2) {
                clearMeasurement(); // 3回目のクリックで一旦クリアして新しく測る
            }

            measurePoints.push(e.latlng);
            const marker = L.marker(e.latlng, {
                icon: L.divIcon({className: '', html: `📍<div style="background:white; border:1px solid #666; padding:2px; font-size:10px; border-radius:3px; white-space:nowrap;">地点 ${measurePoints.length}</div>`, iconAnchor: [10, 20]})
            }).addTo(map);
            measureMarkers.push(marker);

            if (measurePoints.length === 2) {
                // 2地点揃ったら線を引いて距離を計算
                measureLine = L.polyline(measurePoints, {color: '#0071e3', weight: 4, dashArray: '5, 10'}).addTo(map);
                const distanceMeters = measurePoints[0].distanceTo(measurePoints[1]);
                const distanceKm = (distanceMeters / 1000).toFixed(1);
                
                // 中間地点に距離をポップアップ表示
                const midLat = (measurePoints[0].lat + measurePoints[1].lat) / 2;
                const midLng = (measurePoints[0].lng + measurePoints[1].lng) / 2;
                L.popup()
                    .setLatLng([midLat, midLng])
                    .setContent(`<b>直線距離: ${parseFloat(distanceKm).toLocaleString()} km</b>`)
                    .openOn(map);
            }
        } else {
            // 通常のアンテナ設置モードのとき
            currentLatlng = e.latlng;
            updateSimulation();
        }
    });

    document.querySelectorAll('.sim-input').forEach(input => {
        input.addEventListener('input', updateSimulation);
    });

    // 初期起動
    updateSimulation();
</script>
</body>
</html>
