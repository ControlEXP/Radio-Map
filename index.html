<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OSINT シミュレーター</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        header { background: #2c2c2e; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        #map { flex: 1; background: #000; }
    </style>
</head>
<body>
    <header>
        <div>OSINT 電波受信範囲シミュレーター</div>
        <a href="https://swc.nict.go.jp/" target="_blank" style="color: #30a2ff;">🌐 NICT 宇宙天気情報</a>
    </header>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([24.0, 122.5], 4);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri'
        }).addTo(map);
    </script>
</body>
</html>
